server:
  port: 8108

spring:
  application:
    name: gangetong
  datasource:
    url: jdbc:sqlite:./data/gangetong.db?journal_mode=WAL&encoding=UTF-8
    driver-class-name: org.sqlite.JDBC
    username: admin
    password: admin
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      encoding: UTF-8
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    show-sql: true

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.gangetong.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true

jwt:
  secret: gangetong-secret-key-for-jwt-token-generation-please-change-in-production-2024
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "
